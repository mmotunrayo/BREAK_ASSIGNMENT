<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Component</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 flex gap-6">
  <div class="w-64 p-4 border rounded-lg">
    <h3 class="font-bold">Product Card</h3>
    <p class="text-gray-600">Simple default card.</p>
  </div>

  <div class="w-64 p-4 border rounded-lg transition hover:-translate-y-1 hover:shadow-lg">
    <h3 class="font-bold">Product Card</h3>
    <p class="text-gray-600">Lifts slightly on hover.</p>
  </div>

  <div class="w-72 p-5 border-2 border-purple-800 rounded-lg shadow-md">
    <h3 class="font-bold text-lg">Featured Product</h3>
    <p class="text-gray-600">Larger card with a different border color.</p>
  </div>

</body>
</html>
